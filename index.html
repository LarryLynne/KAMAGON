<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>KAMAGON</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="header-panel">
        <div class="top-branding">
            <h1 class="logo">KAMAG<span>ON</span></h1>
        </div>

        <div class="global-controls">
            <label for="fileInput" class="file-label" id="fileInputLabel">
                Вибрати файли
            </label>
            <input type="file" id="fileInput" multiple accept=".xlsx, .xls" style="display: none;">
            
            <span id="fileStatus">Довідник завантажується...</span>

            <div id="progressContainer" class="progress-container" style="display: none;">
                <div id="progressBar" class="progress-bar"></div>
            </div>

            <button id="exportExcelBtn" class="tab-btn" style="margin-left: auto; background-color: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; border-radius: 6px; font-weight: bold; padding: 6px 15px; cursor: pointer;">
                Експорт в Excel
            </button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="tabRaw">Графіки</button>
            <button class="tab-btn" id="tabDetailed">Рейси контейнерів</button>
            <button class="tab-btn" id="tabEvents">Події</button>
            <button class="tab-btn" id="tabKamag">Розрахунок</button>
        </div>
    </div>

    <div class="main-content">
        <div id="tableContainerRaw" class="table-container">
            <div class="tab-controls-panel">
                <button id="togglePtBtn">Пром. точки</button>
                <button id="unknownRoutesBtn">Невідомі маршрути</button>
                <button id="updateDictBtn">Оновити довідник</button>
                <div class="control-group">
                    <span>Інтервал рампи (хв):</span>
                    <input type="number" id="rampInterval" value="10">
                </div>
                <button id="generateDetailedBtn">Порахуй</button>
            </div>
            <div id="rawTableWrapper"></div>
        </div>
        <div id="tableContainerDetailed" class="table-container" style="display: none;"></div>
        <div id="tableContainerEvents" class="table-container" style="display: none;"></div>
        <div id="tableContainerKamag" class="table-container" style="display: none; flex-direction: column;">
            <div style="margin-bottom: 15px; padding: 10px; background: #fff; border: 1px solid #ccc;">
                <label style="font-weight: bold;">Автодвір: 
                    <select id="kamagYardSelect" style="margin-right: 20px; padding: 4px;"></select>
                </label>
                <label style="font-weight: bold; display: none;">День: 
                    <select id="kamagDaySelect" style="padding: 4px;">
                        <option value="Пн">Понеділок</option>
                        <option value="Вт">Вівторок</option>
                        <option value="Ср">Середа</option>
                        <option value="Чт">Четвер</option>
                        <option value="Пт">П'ятниця</option>
                        <option value="Сб">Субота</option>
                        <option value="Нд">Неділя</option>
                    </select>
                </label>
            </div>
            <div id="kamagTableWrapper" style="overflow: auto;"></div>
        </div>
    </div>

    <div id="unknownRoutesModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Маршрути без схеми</h2>
            <button id="copyUnknownBtn" style="margin-bottom: 15px; padding: 6px 12px; font-weight: bold;">Копіювати список</button>
            <div id="unknownRoutesTableContainer"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
