<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>KAMAGON</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="header-panel">
        <div class="top-branding">
            <h1 class="logo">KAMAG<span>ON</span> <span id="loginBtn">🔑</span></h1>
        </div>

        <div class="global-controls">
            <label for="fileInput" class="file-label auth-hidden" id="fileInputLabel">
                Вибрати файли
            </label>
            <input type="file" id="fileInput" multiple accept=".xlsx, .xls" style="display: none;">
            
            <span id="fileStatus">Довідник завантажується...</span>

            <div id="progressContainer" class="progress-container" style="display: none;">
                <div id="progressBar" class="progress-bar"></div>
            </div>

            <button id="exportExcelBtn" class="tab-btn btn-action btn-export">
                Експорт в Excel
            </button>
        </div>

        <div class="tabs">
            <button class="tab-btn auth-hidden" id="tabRaw">Графіки</button>
            <button class="tab-btn auth-hidden" id="tabDetailed">Рейси контейнерів</button>
            <button class="tab-btn auth-hidden" id="tabEvents">Події</button>
            <button class="tab-btn active" id="tabKamag">Розрахунок</button>
        </div>
    </div>

    <div class="main-content">
        <div id="tableContainerRaw" class="table-container" style="display: none;">
            <div class="tab-controls-panel">
                <button id="togglePtBtn">Пром. точки</button>
                <button id="unknownRoutesBtn">Невідомі маршрути</button>
                 <a href="https://docs.google.com/spreadsheets/d/1Pjp5PP1sCR5R9MORAG9JmgcPG4y0q955vJ-T8FajAXs/edit?gid=0#gid=0" target="_blank" class="settings-btn">
                    Налаштування
                </a>
                <button id="updateDictBtn">Оновити довідник</button>
                <div class="control-group">
                    <span>Інтервал рампи (хв):</span>
                    <input type="number" id="rampInterval" value="10">
                </div>
                <button id="generateDetailedBtn">Порахуй</button>
            </div>
            <div id="rawTableWrapper"></div>
        </div>
        <div id="tableContainerDetailed" class="table-container" style="display: none;"></div>
        <div id="tableContainerEvents" class="table-container" style="display: none;"></div>
        <div id="tableContainerKamag" class="table-container" style="display: none; flex-direction: column;">
            <div class="kamag-controls-panel">
                <label>Автодвір: 
                    <select id="kamagYardSelect"></select>
                </label>

                <label class="checkbox-group" style="padding: 0 10px; border: none; background: none; margin-left: 20px; font-size: 12px;">
                    <input type="checkbox" id="hideVirtualFleet">
                    Тільки існуючий флот
                </label>

                <button id="loadGoogleYardBtn" class="tab-btn btn-action btn-load">
                    Завантажити з бази
                </button>
                <button id="saveGoogleBtn" class="tab-btn btn-action btn-save auth-hidden">
                    Зберегти (поточний)
                </button>
                <button id="saveAllGoogleBtn" class="tab-btn btn-action btn-save-all auth-hidden">
                    Зберегти ВСІ
                </button>
            </div>
            <div id="kamagTableWrapper" style="overflow: auto;"></div>
        </div>
    </div>

    <div id="unknownRoutesModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Маршрути без схеми</h2>
            <button id="copyUnknownBtn" style="margin-bottom: 15px; padding: 6px 12px; font-weight: bold;">Копіювати список</button>
            <div id="unknownRoutesTableContainer"></div>
        </div>
    </div>

    <div id="generateModal" class="modal">
        <div class="modal-content generate-modal-content">
            <span class="close-btn" id="closeGenerateModal">&times;</span>
            <h2>Налаштування розрахунку</h2>
            
            <div class="form-group">
                <label>Автодвір (фільтр):
                    <select id="genYardSelect">
                        <option value="ALL">Всі автодвори</option>
                    </select>
                </label>
                
                <div class="form-row">
                    <label>З дати:
                        <input type="date" id="genDateStart">
                    </label>
                    <label>По дату:
                        <input type="date" id="genDateEnd">
                    </label>
                </div>
                
                <label class="checkbox-group">
                    <input type="checkbox" id="genUseScheduleDates" checked>
                    Враховувати дати дії графіків
                </label>
            </div>
            
            <button id="confirmGenerateBtn" class="btn-confirm">Порахувати розклад</button>
        </div>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content" style="max-width: 300px; text-align: center; margin-top: 20vh;">
            <h2 style="border-bottom:none; margin-bottom: 5px;">Авторизація</h2>
            <p style="color: #666; margin-bottom: 15px;">Введіть пароль для доступу</p>
            <input type="password" id="authPassInput" style="width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 15px; font-size: 16px; text-align: center; border: 1px solid #ced4da; border-radius: 6px;">
            <button id="authConfirmBtn" class="btn-confirm">Увійти</button>
            <button id="authCancelBtn" style="margin-top: 15px; background: none; border: none; color: #888; cursor: pointer; text-decoration: underline; font-size: 13px;">Скасувати</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
